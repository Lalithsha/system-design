version: '3.8'

services:
  primary:
    image: postgres:15
    container_name: pg-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data

  replica:
    image: postgres:15
    container_name: pg-replica
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - replica_data:/var/lib/postgresql/data
    # command: ["sleep", "infinity"]  
    depends_on:
      - primary
      

volumes:
  primary_data:
  replica_data: